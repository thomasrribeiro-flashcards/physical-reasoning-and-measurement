<title id='title'>Three candidate graphs of candle length against time</title>
<desc id='desc'>Three small graphs of length L in centimeters against time t in hours, labeled panel one, panel two, and panel three. Panel one shows a straight line rising from the origin. Panel two shows a straight line starting at twenty centimeters and falling to zero at ten hours. Panel three shows a curve starting at twenty centimeters that falls steeply at first and then levels off near six centimeters.</desc>
