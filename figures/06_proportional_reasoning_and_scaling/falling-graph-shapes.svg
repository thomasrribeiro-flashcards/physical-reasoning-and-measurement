<title id='title'>Two falling patterns with labeled values</title>
<desc id='desc'>Two small graphs labeled A and B, each with a horizontal axis marked one through four and dots that sit lower as the horizontal value grows. In A three dots on a straight falling line are labeled sixty at one, forty-five at two, and fifteen at four. In B three dots on a curve that falls steeply and then flattens are labeled sixty at one, thirty at two, and fifteen at four.</desc>
