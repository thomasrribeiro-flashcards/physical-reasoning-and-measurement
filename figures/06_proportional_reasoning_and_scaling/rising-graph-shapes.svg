<title id='title'>Three rising trend lines on separate axes</title>
<desc id='desc'>Three small graphs labeled A, B, and C, each with a horizontal and a vertical axis meeting at a corner marked zero. In A a straight line rises from the corner itself. In B a straight line rises but begins partway up the vertical axis, above the corner. In C a line leaves the corner and curves upward ever more steeply.</desc>
