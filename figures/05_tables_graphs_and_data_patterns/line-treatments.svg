<title id='title'>Two treatments of the same five plotted points</title>
<desc id='desc'>Two small graphs side by side labeled P and Q, each showing the same five dots rising from lower left to upper right with small vertical wobbles. In P the dots are joined point to point by straight segments that bend at every dot. In Q a single straight line passes through the middle of the dots, some dots sitting slightly above the line and some slightly below it.</desc>
