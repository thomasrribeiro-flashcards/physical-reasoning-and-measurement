<title id='title'>A classmate&apos;s graph of stack height against number of books</title>
<desc id='desc'>A graph whose horizontal axis is labeled number of books, marked one through five, and whose vertical axis is labeled stack height in centimeters, with the labels zero, five, ten, twenty, and forty written at equal spacing. Five dots are joined point to point by straight segments. The dots step upward from left to right, except that the dot at three books sits far above its neighbors, and the segments bend sharply up to it and back down.</desc>
