<title id='title'>Two candidate system boundaries</title>
<desc id='desc'>A book stands on a table. To the right, two shelf boards form an open gap. Dashed loop A encloses only the book; a larger dashed loop B encloses the book, the space between, and the shelf gap.</desc>
