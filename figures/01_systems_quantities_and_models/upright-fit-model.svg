<title id='title'>Upright-fit schematic, not to scale</title>
<desc id='desc'>A rigid box is drawn beside two shelf boards that form an open gap. A vertical double-headed arrow marks the box height, labeled 29 cm; another marks the gap height, labeled 31 cm. The drawing is not to scale: the box is drawn slightly taller than the gap.</desc>
