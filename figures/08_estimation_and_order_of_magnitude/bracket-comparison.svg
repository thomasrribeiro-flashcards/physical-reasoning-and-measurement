<title id='title'>Two bounding brackets for a room length compared with a tape-measure reading</title>
<desc id='desc'>A number line marked in meters from three to nine. Above it, one labeled interval bar spans a narrow range near six meters, and a second labeled interval bar spans a wide range from four to eight meters. A dot on the number line marks the later tape-measure reading, labeled six point nine meters.</desc>
