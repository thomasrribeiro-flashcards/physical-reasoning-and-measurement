<title id='title'>Rectangular box packed with unit cubes</title>
<desc id='desc'>A rectangular box drawn in three-quarter view, marked as four centimeters long, three centimeters deep, and two centimeters tall, with grid lines showing it packed with small identical cubes. One front corner cube is shaded, with a note marking its edges as one centimeter.</desc>
