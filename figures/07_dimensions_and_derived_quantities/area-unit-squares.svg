<title id='title'>Rectangular tile covered by a grid of unit squares</title>
<desc id='desc'>A rectangle with its longer side marked as four centimeters and its shorter side marked as three centimeters, divided by grid lines into equal small squares. One corner square is shaded, with a note marking it as one centimeter by one centimeter.</desc>
