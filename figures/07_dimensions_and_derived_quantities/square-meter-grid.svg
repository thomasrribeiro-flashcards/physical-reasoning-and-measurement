<title id='title'>Square meter with one centimeter square marked in a corner</title>
<desc id='desc'>A large square with each side marked as one meter, equal to one hundred centimeters. Near the bottom left corner a tiny shaded square is drawn with a note marking it as one centimeter by one centimeter, deliberately not to scale, and faint grid lines fade out along the bottom edge and left edge.</desc>
