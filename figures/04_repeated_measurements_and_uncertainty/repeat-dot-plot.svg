<title id='title'>Dot plot of six repeated length readings</title>
<desc id='desc'>A number line of lengths in centimeters runs from twelve to thirteen, with labeled marks at every two tenths and small unlabeled steps at every tenth. Six filled dots sit above the line, one per recorded reading, with equal readings stacked vertically. Five dots gather between the twelve point three and twelve point five positions, stacking three high at one value, while a single dot sits alone farther to the right near the twelve point nine position.</desc>
