<title id='title'>Liquid level against a milliliter scale</title>
<desc id='desc'>An upright rounded vessel holds shaded liquid. Along its right side runs a vertical scale labeled from zero to eighty milliliters at every ten, with five equal small steps between neighboring labels. The flat top surface of the liquid lines up with the second small mark above the sixty label, and a dashed guide joins the liquid surface to that point on the scale.</desc>
