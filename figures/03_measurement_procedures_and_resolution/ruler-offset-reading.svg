<title id='title'>Rod lying mid-scale along a millimeter ruler</title>
<desc id='desc'>A shaded metal rod lies just above a ruler scale whose labeled marks run from two to eight centimeters, with ten small millimeter steps between neighboring labels. The rod&apos;s left end aligns with the labeled 2 mark and its right end lies between the labeled 7 and 8 marks, four small steps past the 7. Faint dashed guides drop from each rod end to the scale.</desc>
