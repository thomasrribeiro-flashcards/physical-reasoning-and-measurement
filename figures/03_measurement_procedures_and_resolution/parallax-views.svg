<title id='title'>Sighting a floating pointer from three eye positions</title>
<desc id='desc'>A horizontal scale has labeled marks at twenty, thirty, and forty with equal small steps between them. The tip of a pointer floats a short distance above the scale, directly over the thirty mark. Well above the scale sit three drawn eyes: one to the left, one directly above the pointer tip, and one to the right. From each eye a dashed sight line passes through the pointer tip and continues down to the scale, meeting it at three different points marked with dots labeled a, b, and c from left to right.</desc>
